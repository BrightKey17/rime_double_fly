#encoding utf-8
customization:
  distribution_code_name: bracket
  distribution_version: 0.14.3
  generator: "Rime::SwitcherSettings"
  modified_time: "Wed May 25 21:03:25 2022"
  rime_version: 1.5.3
patch:
  show_notifications_when: always # зҠ¶жҖҒйҖҡзҹҘпјҢеҸҜи®ҫдёәalways/never/appropriate
  us_keyboard_layout: false
  chord_duration: 0.1  # seconds for veteran chord-typist
  fold_options: true
  abbreviate_options: true
  option_list_separator: 'пјҸ'

  schema_list:
    - {schema: crane_double_fly}
    - {schema: crane_luna_dance}
    #- {schema: flypy}
    #- {schema: luna_pinyin}

  menu:
    page_size: 7

  style:
    candidate_list_layout: stacked  # stacked | linear
    display_tray_icon: true
    text_orientation: horizontal  # horizontal | vertical
    inline_preedit: true
    corner_radius: 10
    hilited_corner_radius: 0
    border_height: 0
    border_width: 0
    # space between candidates in stacked layout
    line_spacing: 5
    # space between preedit and candidates in non-inline mode
    spacing: 10
    #candidate_format: '%c. %@'
    # adjust the base line of vertical text
    #base_offset: 6
    #font_face: 'Lucida Grande'
    font_point: 33
    #label_font_face: 'Lucida Grande'
    label_font_point: 15
    #comment_font_face: 'Lucida Grande'
    comment_font_point: 9


  key_binder:
    bindings:
      - {accept: Tab, send: "Shift+Right", when: composing}
      - {accept: "Shift+Tab", send: "Shift+Left", when: composing}
      - {accept: minus, send: Page_Up, when: paging}
      - {accept: equal, send: Page_Down, when: paging}
      - {accept: bracketleft, send: Page_Up, when: paging} # [дёҠзҝ»йЎө
      - {accept: bracketright, send: Page_Up, when: has_menu} # [дёҠзҝ»йЎө
      - {accept: bracketright, send: Page_Down, when: has_menu} # ]дёӢзҝ»йЎө
    # - {accept: comma, send: comma, when: paging} #жіЁй”ҖйҖ—еҸ·зҝ»йЎө
    # - {accept: period, send: period, when: has_menu} #жіЁй”ҖеҸҘеҸ·зҝ»йЎө
      - {accept: semicolon, send: 2, when: has_menu} #еҲҶеҸ·ж¬ЎйҖү
    # - {accept: "Shift+space", toggle: full_shape, when: always} #еҲҮжҚўе…ЁеҚҠи§’
    # - {accept: "Control+Alt+1", toggle: full_shape, when: always} #еҲҮжҚўе…ЁеҚҠи§’ 

  switcher:
    caption: ж–№жЎҲйҖүеҚ•schema-list
    hotkeys: [Control+grave]
    save_options: 
      - half_shape
      - ascii_punct
      - simplification
    fold_options: true
    abbreviate_options: true
   #option_list_separator: 'пјҸ'

  ascii_composer:
    good_old_caps_lock: true
    switch_key: {Caps_Lock: commit_code, Control_R: commit_code, Control_L: noop, Shift_R: noop}

#
# еҸҜз”Ёзҡ„жҢүй”®жңү Caps_Lock, Shift_L, Shift_R, Control_L, control_R
# Mac зі»з»ҹдёҠзҡ„йј йЎ»з®ЎдёҚиғҪеҢәеҲҶе·ҰгҖҒеҸіпјҢеӣ жӯӨеҸӘжңүеҜ№ Shift_L, Control_L зҡ„и®ҫе®ҡиө·дҪңз”Ё
#
# е·Іиҫ“е…Ҙзј–з Ғж—¶жҢүеҲҮжҚўй”®пјҢеҸҜд»ҘиҝӣдёҖжӯҘи®ҫе®ҡиҫ“е…Ҙжі•дёӯиҘҝж–ҮеҲҮжҚўзҡ„еҪўејҸ
# еҸҜйҖүзҡ„дёҙж—¶еҲҮжҚўзӯ–з•Ҙжңүдёүпјҡ
# inline_ascii  # еңЁиҫ“е…Ҙжі•зҡ„дёҙж—¶иҘҝж–Үзј–иҫ‘еҢәеҶ…иҫ“е…Ҙеӯ—жҜҚгҖҒж•°еӯ—гҖҒз¬ҰеҸ·гҖҒз©әж јзӯүпјҢеӣһиҪҰдёҠеұҸеҗҺиҮӘеҠЁеӨҚдҪҚеҲ°дёӯж–Ү
# commit_text е·Іиҫ“е…Ҙзҡ„еҖҷйҖүж–Үеӯ—дёҠеұҸе№¶еҲҮжҚўиҮіиҘҝж–Үиҫ“е…ҘжЁЎејҸ
# commit_code е·Іиҫ“е…Ҙзҡ„зј–з Ғеӯ—з¬ҰдёҠеұҸе№¶еҲҮжҚўиҮіиҘҝж–Үиҫ“е…ҘжЁЎејҸ
# и®ҫдёә noop, еұҸи”ҪиҜҘеҲҮжҚўй”®
#
# еҰӮжһңиҰҒжҠҠCaps Lock и®ҫдёәеҸӘж”№еҸҳеӯ—жҜҚзҡ„еӨ§е°ҸеҶҷиҖҢдёҚеҒҡдёӯиҘҝж–ҮеҲҮжҚўпјҢеҸҜе°Ҷ Caps_Lock еҜ№еә”зҡ„еҲҮжҚўж–№ејҸи®ҫдёә noop
# еҰӮжһңиҰҒд»ҘCaps Lock еҲҮжҚўеҲ°иҘҝж–ҮжЁЎејҸпјҢй»ҳи®Өиҫ“еҮәе°ҸеҶҷеӯ—жҜҚпјҢиҜ·зҪ® ascii_composer/good_old_caps_lock: false
# еҰӮжһңиҰҒд»ҘCaps Lock еҲҮжҚўеҲ°иҘҝж–ҮжЁЎејҸпјҢй»ҳи®Өиҫ“еҮәеӨ§еҶҷеӯ—жҜҚпјҢиҜ·зҪ® ascii_composer/good_old_caps_lock: true
